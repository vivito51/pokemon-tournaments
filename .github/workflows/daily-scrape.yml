name: Daily Pokemon Events Scrape

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        working-directory: backend
        run: python -m playwright install --with-deps chromium

      - name: Run scraper with visible browser under virtual display
        working-directory: backend
        env:
          SCRAPER_HEADLESS: "false"
          FRONTEND_EVENTS_PATH: ../frontend/public/data/events_clean.json
          SCRAPER_ACTION_DELAY_MIN: "6.2"
          SCRAPER_ACTION_DELAY_MAX: "7.8"
          SCRAPER_STORE_DELAY_SECONDS: "10.0"
          SCRAPER_INTERACTION_EXTRA_DELAY_SECONDS: "5.0"
        run: xvfb-run -a python scrapper_runner.py

      - name: Commit updated event data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/events_raw.json backend/data/events_clean.json backend/events.db backend/pokemon_madrid.ics frontend/public/data/events_clean.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update scraped event data"
          git push
